<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- KATHA brand mark: serif K on the roasted-coffee ground, antique-gold rule -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5C3B28"/>
      <stop offset="1" stop-color="#33210F"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <rect x="14" y="15" width="14" height="2.5" rx="1.25" fill="#D4A646" opacity="0.85"/>
  <text x="32" y="47" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="36" font-weight="700" fill="#F8F5F1">K</text>
</svg>
