<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" font-family="Georgia, 'Times New Roman', serif">
  <!-- HORROR · atmospheric dread: the blue door, and the echo of knocking -->
  <rect width="600" height="800" fill="#0E0D0B"/>
  <!-- rain, barely -->
  <g stroke="#F8F5F1" stroke-width="1" opacity="0.10">
    <line x1="80" y1="40" x2="70" y2="110"/><line x1="200" y1="90" x2="190" y2="160"/>
    <line x1="330" y1="30" x2="320" y2="100"/><line x1="470" y1="80" x2="460" y2="150"/>
    <line x1="550" y1="30" x2="540" y2="100"/><line x1="130" y1="180" x2="120" y2="250"/>
  </g>
  <!-- the nailed kitchen door, repainted sweetly in blue -->
  <rect x="200" y="230" width="200" height="440" fill="#274A5E"/>
  <rect x="200" y="230" width="200" height="440" fill="none" stroke="#0E0D0B" stroke-width="4"/>
  <rect x="222" y="260" width="70" height="120" fill="none" stroke="#1B3648" stroke-width="5"/>
  <rect x="308" y="260" width="70" height="120" fill="none" stroke="#1B3648" stroke-width="5"/>
  <rect x="222" y="410" width="156" height="220" fill="none" stroke="#1B3648" stroke-width="5"/>
  <!-- nails, from the outside -->
  <g fill="#D4A646" opacity="0.8">
    <circle cx="210" cy="250" r="3"/><circle cx="390" cy="250" r="3"/>
    <circle cx="210" cy="650" r="3"/><circle cx="390" cy="650" r="3"/>
  </g>
  <!-- the knock, echoing: three rings, the third barely there -->
  <g fill="none" stroke="#F8F5F1">
    <circle cx="300" cy="440" r="26" stroke-width="2.5" opacity="0.85"/>
    <circle cx="300" cy="440" r="52" stroke-width="1.8" opacity="0.4"/>
    <circle cx="300" cy="440" r="82" stroke-width="1.2" opacity="0.15"/>
  </g>
  <text x="300" y="90" text-anchor="middle" font-size="15" letter-spacing="10" fill="#D4A646" opacity="0.85">KATHA · HORROR</text>
  <text x="300" y="726" text-anchor="middle" font-size="44" font-weight="bold" fill="#F8F5F1">Ang Ikatlong Katok</text>
  <text x="300" y="766" text-anchor="middle" font-size="18" font-style="italic" fill="#7FA8BF">Remedios Cua</text>
</svg>
