<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" font-family="Georgia, 'Times New Roman', serif">
  <!-- POETRY · typography-first: the title is the whole night -->
  <rect width="600" height="800" fill="#1F1F1F"/>
  <text x="52" y="200" font-size="92" font-style="italic" fill="#F8F5F1" opacity="0.94">mga</text>
  <text x="52" y="330" font-size="112" font-style="italic" font-weight="bold" fill="#F8F5F1">liham</text>
  <text x="52" y="440" font-size="72" font-style="italic" fill="#8A8580">sa</text>
  <text x="52" y="590" font-size="118" font-style="italic" font-weight="bold" fill="#D4A646">dilim</text>
  <!-- one candle, reduced to a mark of punctuation -->
  <rect x="514" y="536" width="10" height="40" rx="3" fill="#F8F5F1" opacity="0.85"/>
  <path d="M519 516 C525 526 524 532 519 536 C514 532 513 526 519 516 Z" fill="#D4A646"/>
  <circle cx="519" cy="524" r="26" fill="#D4A646" opacity="0.12"/>
  <!-- a single line, like a rule in a letter -->
  <rect x="52" y="648" width="220" height="2" fill="#8A8580" opacity="0.6"/>
  <text x="52" y="692" font-size="19" font-style="italic" fill="#F8F5F1" opacity="0.85">J. Salvador</text>
  <text x="52" y="754" font-size="13" letter-spacing="9" fill="#D4A646" opacity="0.8">KATHA · POETRY</text>
</svg>
