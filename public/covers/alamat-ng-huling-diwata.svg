<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" font-family="Georgia, 'Times New Roman', serif">
  <!-- FANTASY · the last acacia at kilometer eleven; the road bends around it -->
  <rect width="600" height="800" fill="#1C1430"/>
  <!-- dusk gradient band -->
  <rect x="0" y="480" width="600" height="180" fill="#C45A3C" opacity="0.18"/>
  <rect x="0" y="540" width="600" height="120" fill="#D4A646" opacity="0.10"/>
  <!-- the acacia: a district, not a tree -->
  <g>
    <rect x="284" y="430" width="32" height="200" fill="#33210F"/>
    <path d="M300 460 Q170 430 120 340 Q90 250 190 210 Q230 120 330 150 Q450 110 480 230 Q560 280 500 360 Q460 450 300 460 Z" fill="#2E7D5B"/>
    <path d="M300 452 Q200 430 160 350 Q140 280 220 250 Q260 180 340 200 Q430 180 450 270 Q500 310 450 370 Q420 440 300 452 Z" fill="#173B2C"/>
  </g>
  <!-- her lights in the canopy: the town seen from the sea -->
  <g fill="#D4A646">
    <circle cx="220" cy="300" r="4"/><circle cx="300" cy="250" r="5"/><circle cx="380" cy="310" r="4"/>
    <circle cx="260" cy="380" r="3.5"/><circle cx="350" cy="395" r="4"/><circle cx="170" cy="345" r="3"/>
    <circle cx="430" cy="350" r="3.5"/><circle cx="320" cy="330" r="3"/>
  </g>
  <!-- fireflies loose below -->
  <g fill="#D4A646" opacity="0.8">
    <circle cx="140" cy="560" r="2.5"/><circle cx="470" cy="530" r="2.5"/><circle cx="520" cy="600" r="2"/><circle cx="90" cy="620" r="2"/>
  </g>
  <!-- the road, bending around her -->
  <path d="M-20 720 Q180 700 250 660 Q300 632 350 660 Q420 700 620 720 L620 800 L-20 800 Z" fill="#33210F"/>
  <path d="M0 745 Q190 722 258 682 Q300 660 342 682 Q410 722 600 745" fill="none" stroke="#D4A646" stroke-width="4" stroke-dasharray="18 14" opacity="0.7"/>
  <!-- the surveyor's X, small and orange and wrong -->
  <g stroke="#C45A3C" stroke-width="5" opacity="0.9">
    <line x1="288" y1="592" x2="312" y2="616"/>
    <line x1="312" y1="592" x2="288" y2="616"/>
  </g>
  <text x="300" y="90" text-anchor="middle" font-size="14" letter-spacing="8" fill="#D4A646">KATHA · FANTASY</text>
  <text x="300" y="152" text-anchor="middle" font-size="44" font-weight="bold" fill="#F8F5F1">Alamat ng</text>
  <text x="300" y="205" text-anchor="middle" font-size="44" font-weight="bold" fill="#F8F5F1">Huling Diwata</text>
  <text x="300" y="248" text-anchor="middle" font-size="20" font-style="italic" fill="#D4A646">Elia Navarro</text>
  <text x="300" y="775" text-anchor="middle" font-size="13" fill="#F8F5F1" opacity="0.55">the tree stands, the town drinks</text>
</svg>
