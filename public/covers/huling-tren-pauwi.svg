<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" font-family="Georgia, 'Times New Roman', serif">
  <!-- Huling Tren Pauwi — rails converging into the last light home -->
  <rect width="600" height="800" fill="#33210F"/>
  <rect width="600" height="360" fill="#5C3B28"/>
  <circle cx="300" cy="360" r="70" fill="#D4A646" opacity="0.85"/>
  <!-- rails -->
  <path d="M140 800 L292 380" stroke="#D4A646" stroke-width="5" fill="none"/>
  <path d="M460 800 L308 380" stroke="#D4A646" stroke-width="5" fill="none"/>
  <path d="M40 800 L280 390" stroke="#F8F5F1" stroke-width="2" fill="none" opacity="0.3"/>
  <path d="M560 800 L320 390" stroke="#F8F5F1" stroke-width="2" fill="none" opacity="0.3"/>
  <!-- sleepers -->
  <g stroke="#F8F5F1" opacity="0.35">
    <line x1="255" y1="470" x2="345" y2="470" stroke-width="3"/>
    <line x1="235" y1="540" x2="365" y2="540" stroke-width="3.5"/>
    <line x1="210" y1="625" x2="390" y2="625" stroke-width="4"/>
    <line x1="180" y1="720" x2="420" y2="720" stroke-width="4.5"/>
  </g>
  <!-- carriage window lights -->
  <g fill="#D4A646" opacity="0.9">
    <rect x="120" y="180" width="26" height="16" rx="2"/><rect x="162" y="180" width="26" height="16" rx="2"/>
    <rect x="204" y="180" width="26" height="16" rx="2"/><rect x="412" y="180" width="26" height="16" rx="2"/>
    <rect x="454" y="180" width="26" height="16" rx="2"/>
  </g>
  <text x="300" y="96" text-anchor="middle" font-size="17" letter-spacing="8" fill="#D4A646">KATHA</text>
  <text x="300" y="255" text-anchor="middle" font-size="52" font-weight="bold" fill="#F8F5F1">Huling Tren</text>
  <text x="300" y="318" text-anchor="middle" font-size="52" font-weight="bold" fill="#F8F5F1">Pauwi</text>
  <text x="300" y="435" text-anchor="middle" font-size="20" font-style="italic" fill="#D4A646">Rafael Lim</text>
  <text x="300" y="775" text-anchor="middle" font-size="12" letter-spacing="5" fill="#F8F5F1" opacity="0.5">LINKED STORIES</text>
</svg>
