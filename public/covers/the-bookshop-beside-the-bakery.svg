<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" font-family="Georgia, 'Times New Roman', serif">
  <!-- COZY FICTION · two storefronts, one wall, the ledge, the commuting cat -->
  <rect width="600" height="800" fill="#F8F5F1"/>
  <!-- the two shops -->
  <rect x="40" y="360" width="250" height="300" fill="#EDE7DE" stroke="#5C3B28" stroke-width="4"/>
  <rect x="310" y="360" width="250" height="300" fill="#F3E6D2" stroke="#5C3B28" stroke-width="4"/>
  <!-- the party wall, one brick thick, taking the bakery's side -->
  <rect x="290" y="360" width="20" height="300" fill="#B56A44"/>
  <g stroke="#F8F5F1" stroke-width="2" opacity="0.6">
    <line x1="290" y1="400" x2="310" y2="400"/><line x1="290" y1="440" x2="310" y2="440"/><line x1="290" y1="480" x2="310" y2="480"/>
    <line x1="290" y1="520" x2="310" y2="520"/><line x1="290" y1="560" x2="310" y2="560"/><line x1="290" y1="600" x2="310" y2="600"/>
  </g>
  <!-- the ledge: bread going east, books going west -->
  <rect x="272" y="498" width="56" height="8" fill="#5C3B28"/>
  <rect x="252" y="480" width="30" height="18" rx="3" fill="#2E7D5B"/>
  <ellipse cx="330" cy="490" rx="16" ry="9" fill="#D4A646"/>
  <!-- awnings -->
  <g>
    <path d="M32 360 L298 360 L282 320 L48 320 Z" fill="#2E7D5B"/>
    <path d="M48 320 L82 320 L74 360 L40 360 Z" fill="#F8F5F1" opacity="0.35"/>
    <path d="M116 320 L150 320 L142 360 L108 360 Z" fill="#F8F5F1" opacity="0.35"/>
    <path d="M184 320 L218 320 L210 360 L176 360 Z" fill="#F8F5F1" opacity="0.35"/>
  </g>
  <g>
    <path d="M302 360 L568 360 L552 320 L318 320 Z" fill="#C45A3C"/>
    <path d="M318 320 L352 320 L344 360 L310 360 Z" fill="#F8F5F1" opacity="0.35"/>
    <path d="M386 320 L420 320 L412 360 L378 360 Z" fill="#F8F5F1" opacity="0.35"/>
    <path d="M454 320 L488 320 L480 360 L446 360 Z" fill="#F8F5F1" opacity="0.35"/>
  </g>
  <!-- bookshop window: spines -->
  <rect x="70" y="420" width="150" height="150" fill="#F8F5F1" stroke="#5C3B28" stroke-width="3"/>
  <g>
    <rect x="84" y="470" width="18" height="90" fill="#2E7D5B"/><rect x="106" y="482" width="14" height="78" fill="#D4A646"/>
    <rect x="124" y="460" width="20" height="100" fill="#B56A44"/><rect x="148" y="478" width="14" height="82" fill="#5C3B28"/>
    <rect x="166" y="468" width="18" height="92" fill="#C45A3C"/><rect x="188" y="486" width="14" height="74" fill="#2E7D5B"/>
  </g>
  <!-- bakery window: pandesal pyramid, steam -->
  <rect x="380" y="420" width="150" height="150" fill="#F8F5F1" stroke="#5C3B28" stroke-width="3"/>
  <g fill="#D4A646">
    <ellipse cx="420" cy="548" rx="20" ry="12"/><ellipse cx="458" cy="548" rx="20" ry="12"/><ellipse cx="496" cy="548" rx="20" ry="12"/>
    <ellipse cx="438" cy="528" rx="20" ry="12"/><ellipse cx="476" cy="528" rx="20" ry="12"/>
    <ellipse cx="457" cy="508" rx="20" ry="12"/>
  </g>
  <path d="M445 490 q6 -14 -2 -26 M470 490 q6 -14 -2 -26" fill="none" stroke="#B56A44" stroke-width="3" opacity="0.7"/>
  <!-- Margination, commuting over the wall -->
  <g fill="#33210F">
    <ellipse cx="300" cy="348" rx="20" ry="9"/>
    <circle cx="318" cy="340" r="8"/>
    <path d="M313 334 L316 326 L319 334 Z"/><path d="M319 334 L322 326 L325 334 Z"/>
    <path d="M282 348 q-12 -4 -10 -16" fill="none" stroke="#33210F" stroke-width="4"/>
  </g>
  <!-- sidewalk -->
  <rect x="0" y="660" width="600" height="10" fill="#33210F"/>
  <text x="300" y="100" text-anchor="middle" font-size="14" letter-spacing="8" fill="#B56A44">KATHA · COZY FICTION</text>
  <text x="300" y="170" text-anchor="middle" font-size="42" font-weight="bold" fill="#33210F">The Bookshop</text>
  <text x="300" y="222" text-anchor="middle" font-size="42" font-weight="bold" fill="#33210F">Beside the Bakery</text>
  <text x="300" y="266" text-anchor="middle" font-size="20" font-style="italic" fill="#5C3B28">Odette Ramas</text>
  <text x="300" y="740" text-anchor="middle" font-size="13" fill="#5C3B28" opacity="0.75">everything in here smells like morning</text>
</svg>
