<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" font-family="Georgia, 'Times New Roman', serif">
  <!-- CONTEMPORARY ROMANCE · illustrated, warm, expressive: two cups, one table -->
  <rect width="600" height="800" fill="#F3E3CE"/>
  <circle cx="510" cy="120" r="150" fill="#D4A646" opacity="0.35"/>
  <!-- the round window table -->
  <ellipse cx="300" cy="560" rx="190" ry="34" fill="#B56A44"/>
  <rect x="284" y="560" width="32" height="150" fill="#8A4E32"/>
  <ellipse cx="300" cy="712" rx="70" ry="12" fill="#8A4E32"/>
  <!-- two cups, angled toward each other -->
  <g transform="rotate(-6 220 520)">
    <rect x="185" y="495" width="70" height="52" rx="10" fill="#F8F5F1"/>
    <path d="M255 508 q30 10 0 26" fill="none" stroke="#F8F5F1" stroke-width="8"/>
    <ellipse cx="220" cy="497" rx="35" ry="8" fill="#5C3B28"/>
  </g>
  <g transform="rotate(6 384 520)">
    <rect x="349" y="495" width="70" height="52" rx="10" fill="#F8F5F1"/>
    <path d="M349 508 q-30 10 0 26" fill="none" stroke="#F8F5F1" stroke-width="8"/>
    <ellipse cx="384" cy="497" rx="35" ry="8" fill="#5C3B28"/>
  </g>
  <!-- steam, leaning together -->
  <path d="M225 470 q10 -22 -4 -40 q-10 -16 4 -32" fill="none" stroke="#B56A44" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <path d="M378 470 q-10 -22 4 -40 q10 -16 -4 -32" fill="none" stroke="#B56A44" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <text x="300" y="86" text-anchor="middle" font-size="15" letter-spacing="8" fill="#B56A44">KATHA · ROMANCE</text>
  <text x="300" y="205" text-anchor="middle" font-size="66" font-weight="bold" fill="#33210F">Coffee</text>
  <text x="300" y="280" text-anchor="middle" font-size="46" font-style="italic" fill="#B56A44">after</text>
  <text x="300" y="360" text-anchor="middle" font-size="66" font-weight="bold" fill="#33210F">Five</text>
  <text x="300" y="758" text-anchor="middle" font-size="20" font-style="italic" fill="#5C3B28">Clara Mendoza</text>
</svg>
