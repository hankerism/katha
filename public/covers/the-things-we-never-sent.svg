<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" font-family="Inter, Helvetica, Arial, sans-serif">
  <!-- THRILLER · stark type, one unsettling element: the cursor still blinking -->
  <rect width="600" height="800" fill="#1F1F1F"/>
  <!-- phone-glow band from below -->
  <linearGradient id="glow" x1="0" y1="1" x2="0" y2="0">
    <stop offset="0" stop-color="#D4A646" stop-opacity="0.30"/>
    <stop offset="0.4" stop-color="#D4A646" stop-opacity="0.05"/>
    <stop offset="1" stop-color="#D4A646" stop-opacity="0"/>
  </linearGradient>
  <rect width="600" height="800" fill="url(#glow)"/>
  <text x="60" y="200" font-size="64" font-weight="800" fill="#F8F5F1" letter-spacing="-1">THE</text>
  <text x="60" y="280" font-size="64" font-weight="800" fill="#F8F5F1" letter-spacing="-1">THINGS</text>
  <text x="60" y="360" font-size="64" font-weight="800" fill="#F8F5F1" letter-spacing="-1">WE</text>
  <text x="60" y="440" font-size="64" font-weight="800" fill="#8A8580" letter-spacing="-1" text-decoration="line-through">NEVER</text>
  <text x="60" y="520" font-size="64" font-weight="800" fill="#F8F5F1" letter-spacing="-1">SENT</text>
  <!-- the cursor, mid-draft -->
  <rect x="248" y="474" width="7" height="54" fill="#D4A646">
    <animate attributeName="opacity" values="1;1;0;0" dur="1.2s" repeatCount="indefinite"/>
  </rect>
  <!-- delivered tick, wrong place, wrong time -->
  <text x="60" y="640" font-size="17" fill="#8A8580" font-family="Inter, sans-serif">MIKAELA TORRES · typing…</text>
  <rect x="60" y="660" width="220" height="2" fill="#D4A646" opacity="0.6"/>
  <text x="60" y="726" font-size="15" letter-spacing="8" fill="#D4A646">KATHA · THRILLER</text>
  <text x="60" y="762" font-size="19" font-style="italic" fill="#F8F5F1" font-family="Georgia, serif">Dain Villanueva</text>
</svg>
