<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" font-family="Georgia, 'Times New Roman', serif">
  <!-- COZY FICTION · dense, friendly illustration: the shop, mid-afternoon -->
  <rect width="600" height="800" fill="#F3E8D8"/>
  <!-- shelf one -->
  <rect x="60" y="150" width="480" height="10" fill="#5C3B28"/>
  <g>
    <rect x="70" y="70" width="30" height="80" fill="#2E7D5B"/>
    <rect x="105" y="82" width="24" height="68" fill="#B56A44"/>
    <rect x="134" y="64" width="34" height="86" fill="#D4A646"/>
    <rect x="173" y="78" width="26" height="72" fill="#C45A3C"/>
    <g transform="rotate(-10 226 150)"><rect x="206" y="72" width="28" height="78" fill="#5C3B28"/></g>
    <rect x="250" y="86" width="22" height="64" fill="#2E7D5B"/>
  </g>
  <!-- hanging plant -->
  <path d="M420 60 q0 40 -26 58 M420 60 q0 44 22 60 M420 60 q-2 30 0 46" stroke="#2E7D5B" stroke-width="4" fill="none" stroke-linecap="round"/>
  <circle cx="420" cy="56" r="16" fill="#B56A44"/>
  <!-- shelf two with the cat -->
  <rect x="60" y="330" width="480" height="10" fill="#5C3B28"/>
  <g>
    <rect x="72" y="250" width="26" height="80" fill="#C45A3C"/>
    <rect x="103" y="262" width="30" height="68" fill="#2E7D5B"/>
    <rect x="138" y="244" width="24" height="86" fill="#D4A646"/>
  </g>
  <!-- Margination, asleep on poetry -->
  <g fill="#33210F">
    <ellipse cx="330" cy="312" rx="62" ry="26"/>
    <circle cx="392" cy="296" r="22"/>
    <path d="M378 280 l8 -16 l10 12 Z"/><path d="M398 278 l8 -14 l8 14 Z"/>
    <path d="M268 314 q-24 4 -20 -18" stroke="#33210F" stroke-width="8" fill="none" stroke-linecap="round"/>
  </g>
  <!-- teacup on the lower shelf -->
  <g transform="translate(470,286)">
    <rect x="0" y="16" width="40" height="28" rx="6" fill="#F8F5F1" stroke="#5C3B28" stroke-width="3"/>
    <path d="M40 22 q18 6 0 16" fill="none" stroke="#5C3B28" stroke-width="3"/>
    <path d="M12 10 q4 -8 0 -14 M26 10 q4 -8 0 -14" stroke="#B56A44" stroke-width="2.5" fill="none"/>
  </g>
  <text x="300" y="470" text-anchor="middle" font-size="72" font-weight="bold" fill="#33210F">Shelf Life</text>
  <path d="M180 496 q120 14 240 0" fill="none" stroke="#D4A646" stroke-width="5" stroke-linecap="round"/>
  <text x="300" y="546" text-anchor="middle" font-size="20" font-style="italic" fill="#5C3B28">Odette Ramas</text>
  <!-- the rule, hand-lettered -->
  <rect x="140" y="600" width="320" height="64" rx="8" fill="#F8F5F1" stroke="#5C3B28" stroke-width="2.5"/>
  <text x="300" y="640" text-anchor="middle" font-size="17" letter-spacing="3" fill="#B56A44">CHECK INSIDE THE BOOKS</text>
  <text x="300" y="748" text-anchor="middle" font-size="13" letter-spacing="7" fill="#B56A44">KATHA · COZY FICTION</text>
</svg>
