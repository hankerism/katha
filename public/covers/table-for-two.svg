<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" font-family="Georgia, 'Times New Roman', serif">
  <!-- ═══════════════════════════════════════════════════════════════════
       TABLE FOR TWO · Hankerism — the KATHA flagship
       A premium contemporary-romance jacket, illustrated entirely in SVG:
       an arched café window at dusk, a city that keeps its own hours, and
       the small warm evidence of two people — coffee, carbonara, and one
       unread message. No hearts. No silhouettes. Just the table.
       ═══════════════════════════════════════════════════════════════════ -->
  <defs>
    <linearGradient id="tft-wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F7E4D3"/>
      <stop offset="1" stop-color="#EFC5AC"/>
    </linearGradient>
    <linearGradient id="tft-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#39716E"/>
      <stop offset="0.42" stop-color="#6E9287"/>
      <stop offset="0.68" stop-color="#F0B183"/>
      <stop offset="0.9" stop-color="#E8875F"/>
    </linearGradient>
    <linearGradient id="tft-table" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#C9714A"/>
      <stop offset="0.18" stop-color="#C1653F"/>
      <stop offset="1" stop-color="#9E4E2D"/>
    </linearGradient>
    <radialGradient id="tft-sun" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FFDFa0"/>
      <stop offset="0.55" stop-color="#EFB954"/>
      <stop offset="1" stop-color="#EFB954" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="tft-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FFE9B8" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#FFE9B8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- warm plaster wall -->
  <rect width="600" height="800" fill="url(#tft-wall)"/>

  <!-- ── the arched window ─────────────────────────────────────────────── -->
  <path d="M70 560 L70 250 A230 230 0 0 1 530 250 L530 560 Z" fill="url(#tft-sky)"/>

  <!-- early stars in the teal -->
  <g fill="#FFF6EA">
    <circle cx="150" cy="120" r="2"/><circle cx="452" cy="96" r="1.6"/><circle cx="384" cy="66" r="2"/>
    <circle cx="216" cy="72" r="1.5"/><circle cx="496" cy="168" r="1.8"/><circle cx="110" cy="196" r="1.5"/>
    <path d="M300 52 l2.4 6 6 2.4 -6 2.4 -2.4 6 -2.4 -6 -6 -2.4 6 -2.4 Z" opacity="0.9"/>
  </g>

  <!-- low sun, and the light it spends -->
  <circle cx="300" cy="452" r="120" fill="url(#tft-sun)" opacity="0.55"/>
  <circle cx="300" cy="452" r="46" fill="#F3BC5E"/>

  <!-- city skyline, keeping its own hours -->
  <g fill="#573B54">
    <rect x="70" y="470" width="52" height="90"/>
    <rect x="122" y="440" width="44" height="120"/>
    <rect x="166" y="488" width="58" height="72"/>
    <rect x="224" y="452" width="40" height="108"/>
    <rect x="264" y="486" width="50" height="74"/>
    <rect x="314" y="446" width="46" height="114"/>
    <rect x="360" y="478" width="56" height="82"/>
    <rect x="416" y="436" width="42" height="124"/>
    <rect x="458" y="472" width="72" height="88"/>
  </g>
  <!-- a few windows still awake -->
  <g fill="#EFB954">
    <rect x="134" y="456" width="7" height="9"/><rect x="150" y="478" width="7" height="9"/>
    <rect x="236" y="468" width="7" height="9"/><rect x="326" y="462" width="7" height="9"/>
    <rect x="341" y="490" width="7" height="9"/><rect x="428" y="452" width="7" height="9"/>
    <rect x="428" y="480" width="7" height="9"/><rect x="480" y="488" width="7" height="9"/>
  </g>

  <!-- fairy lights strung across the glass -->
  <path d="M70 296 Q300 372 530 284" fill="none" stroke="#7A5C50" stroke-width="2.5" opacity="0.85"/>
  <g>
    <circle cx="128" cy="318" r="13" fill="url(#tft-glow)"/><circle cx="128" cy="318" r="5.5" fill="#FFD98A"/>
    <circle cx="196" cy="336" r="13" fill="url(#tft-glow)"/><circle cx="196" cy="336" r="5.5" fill="#FFD98A"/>
    <circle cx="266" cy="346" r="13" fill="url(#tft-glow)"/><circle cx="266" cy="346" r="5.5" fill="#FFD98A"/>
    <circle cx="338" cy="344" r="13" fill="url(#tft-glow)"/><circle cx="338" cy="344" r="5.5" fill="#FFD98A"/>
    <circle cx="408" cy="330" r="13" fill="url(#tft-glow)"/><circle cx="408" cy="330" r="5.5" fill="#FFD98A"/>
    <circle cx="474" cy="308" r="13" fill="url(#tft-glow)"/><circle cx="474" cy="308" r="5.5" fill="#FFD98A"/>
  </g>

  <!-- window frame -->
  <path d="M70 560 L70 250 A230 230 0 0 1 530 250 L530 560" fill="none" stroke="#573B54" stroke-width="12"/>
  <path d="M82 556 L82 252 A218 218 0 0 1 518 252 L518 556" fill="none" stroke="#D4A646" stroke-width="2" opacity="0.55"/>
  <line x1="60" y1="562" x2="540" y2="562" stroke="#573B54" stroke-width="14"/>

  <!-- ── hanging plants, minding their own business ────────────────────── -->
  <g>
    <path d="M96 0 L96 34" stroke="#7A5C50" stroke-width="3"/>
    <path d="M70 44 Q96 26 122 44 L116 66 Q96 76 76 66 Z" fill="#B0623E"/>
    <g fill="#8FAF87">
      <path d="M78 66 q-14 40 -6 78 q4 6 9 1 q10 -42 4 -78 Z"/>
      <path d="M96 72 q-2 48 8 92 q5 6 9 0 q2 -50 -8 -92 Z"/>
      <path d="M114 66 q16 34 12 70 q-3 7 -9 2 q-10 -38 -12 -70 Z"/>
    </g>
    <g fill="#6E9268">
      <ellipse cx="80" cy="96" rx="5" ry="10" transform="rotate(14 80 96)"/>
      <ellipse cx="103" cy="122" rx="5" ry="10" transform="rotate(-8 103 122)"/>
      <ellipse cx="122" cy="102" rx="5" ry="10" transform="rotate(-20 122 102)"/>
    </g>
  </g>
  <g transform="translate(412,0) scale(0.82)">
    <path d="M96 0 L96 34" stroke="#7A5C50" stroke-width="3"/>
    <path d="M70 44 Q96 26 122 44 L116 66 Q96 76 76 66 Z" fill="#B0623E"/>
    <g fill="#8FAF87">
      <path d="M80 66 q-12 34 -4 64 q4 6 9 1 q8 -36 2 -65 Z"/>
      <path d="M98 72 q0 40 10 74 q5 5 8 -1 q0 -42 -10 -73 Z"/>
      <path d="M114 66 q14 28 10 58 q-3 7 -9 2 q-8 -32 -10 -60 Z"/>
    </g>
  </g>

  <!-- ── title, set in the sky ─────────────────────────────────────────── -->
  <g text-anchor="middle">
    <text x="303" y="209" font-size="92" font-weight="bold" fill="#3E2A3C" opacity="0.35">Table</text>
    <text x="300" y="206" font-size="92" font-weight="bold" fill="#FFF6EA">Table</text>
    <text x="300" y="262" font-size="40" font-style="italic" fill="#FFD98A">for</text>
    <path d="M266 274 Q300 286 334 274" fill="none" stroke="#FFD98A" stroke-width="2.5" opacity="0.9"/>
    <text x="303" y="399" font-size="92" font-weight="bold" fill="#3E2A3C" opacity="0.35">Two</text>
    <text x="300" y="396" font-size="92" font-weight="bold" fill="#FFF6EA">Two</text>
  </g>

  <!-- ── two chairs at the corners, one author on the wall ─────────────── -->
  <rect x="64" y="596" width="104" height="66" rx="18" fill="#573B54"/>
  <rect x="76" y="608" width="80" height="44" rx="12" fill="#6B4966"/>
  <rect x="432" y="596" width="104" height="66" rx="18" fill="#573B54"/>
  <rect x="444" y="608" width="80" height="44" rx="12" fill="#6B4966"/>
  <text x="300" y="598" text-anchor="middle" font-size="12" letter-spacing="5" fill="#B0623E">A NOVEL BY</text>
  <text x="300" y="632" text-anchor="middle" font-size="27" letter-spacing="7" font-weight="bold" fill="#573B54">HANKERISM</text>

  <!-- ── the table, and the evidence ───────────────────────────────────── -->
  <path d="M28 668 Q300 640 572 668 L572 800 L28 800 Z" fill="url(#tft-table)"/>
  <path d="M28 668 Q300 640 572 668 L572 678 Q300 650 28 678 Z" fill="#FFF6EA" opacity="0.18"/>
  <!-- window light, spilling onto the wood -->
  <ellipse cx="300" cy="700" rx="240" ry="60" fill="url(#tft-glow)" opacity="0.5"/>

  <!-- carbonara, the opening question -->
  <g transform="translate(196,706)">
    <ellipse cx="0" cy="10" rx="78" ry="26" fill="#E8875F" opacity="0.35"/>
    <ellipse cx="0" cy="4" rx="74" ry="24" fill="#FFF6EA"/>
    <ellipse cx="0" cy="4" rx="56" ry="17" fill="#F3E3C8"/>
    <g fill="none" stroke="#EFB954" stroke-width="4.5" stroke-linecap="round">
      <path d="M-40 2 q18 -12 40 -2 q20 9 38 -2"/>
      <path d="M-34 9 q22 -13 46 -3 q16 7 28 -1"/>
      <path d="M-24 -4 q20 -8 44 2"/>
    </g>
    <g fill="#B0623E">
      <rect x="-22" y="-2" width="9" height="6" rx="2" transform="rotate(18 -22 -2)"/>
      <rect x="8" y="4" width="9" height="6" rx="2" transform="rotate(-12 8 4)"/>
      <rect x="28" y="-4" width="8" height="6" rx="2" transform="rotate(30 28 -4)"/>
    </g>
    <path d="M-70 26 l-18 8 M-70 26 l-20 2 M-70 26 l-16 -6" stroke="#8B8B85" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- two coffees, two clocks -->
  <ellipse cx="392" cy="722" rx="42" ry="10" fill="#7A3B21" opacity="0.35"/>
  <ellipse cx="478" cy="740" rx="36" ry="9" fill="#7A3B21" opacity="0.35"/>
  <g transform="translate(392,690)">
    <ellipse cx="0" cy="26" rx="34" ry="10" fill="#F3E3C8"/>
    <rect x="-22" y="-8" width="44" height="34" rx="9" fill="#FFF6EA"/>
    <path d="M22 0 q20 7 0 18" fill="none" stroke="#FFF6EA" stroke-width="6"/>
    <ellipse cx="0" cy="-8" rx="22" ry="6" fill="#5C3B28"/>
    <path d="M-8 -18 q-5 -12 2 -22 M6 -18 q7 -10 1 -20" fill="none" stroke="#FFF6EA" stroke-width="3" opacity="0.85"/>
  </g>
  <g transform="translate(478,712)">
    <ellipse cx="0" cy="22" rx="30" ry="9" fill="#F3E3C8"/>
    <rect x="-19" y="-6" width="38" height="29" rx="8" fill="#8FAF87"/>
    <path d="M19 1 q17 6 0 15" fill="none" stroke="#8FAF87" stroke-width="5.5"/>
    <ellipse cx="0" cy="-6" rx="19" ry="5" fill="#5C3B28"/>
    <path d="M-4 -15 q-4 -10 2 -18" fill="none" stroke="#FFF6EA" stroke-width="2.5" opacity="0.8"/>
  </g>

  <!-- the phone, face up, one unread -->
  <ellipse cx="98" cy="774" rx="44" ry="11" fill="#7A3B21" opacity="0.35"/>
  <g transform="translate(96,724) rotate(-8)">
    <rect x="-26" y="-40" width="54" height="86" rx="10" fill="#2A2430"/>
    <rect x="-20" y="-33" width="42" height="70" rx="6" fill="#9ED4CC"/>
    <rect x="-14" y="-24" width="30" height="7" rx="3.5" fill="#FFF6EA" opacity="0.85"/>
    <rect x="-14" y="-11" width="22" height="7" rx="3.5" fill="#FFF6EA" opacity="0.6"/>
    <circle cx="14" cy="-27" r="7" fill="#E8875F"/>
    <text x="14" y="-23.5" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFF6EA" font-family="Georgia, serif">1</text>
  </g>

  <!-- a note, handwritten, not sent either -->
  <ellipse cx="312" cy="778" rx="34" ry="8" fill="#7A3B21" opacity="0.3"/>
  <g transform="translate(310,758) rotate(5)">
    <rect x="-30" y="-16" width="60" height="34" rx="3" fill="#FFF6EA"/>
    <path d="M-20 -6 h40 M-20 2 h32 M-20 10 h24" stroke="#B0623E" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  </g>

  <!-- rim light on the chairs, facing the window -->
  <path d="M82 596 h68 a18 18 0 0 1 18 18 v2 h-4 v-2 a14 14 0 0 0 -14 -14 h-68 Z" fill="#FFD98A" opacity="0.35"/>
  <path d="M450 596 h68 a18 18 0 0 1 18 18 v2 h-4 v-2 a14 14 0 0 0 -14 -14 h-68 Z" fill="#FFD98A" opacity="0.35"/>

  <!-- the quiet vignette that makes it a jacket, not a diagram -->
  <rect width="600" height="800" fill="#3E2A3C" opacity="0.05"/>
  <path d="M0 0 h600 v800 h-600 Z M40 40 Q300 8 560 40 L560 760 Q300 792 40 760 Z" fill-rule="evenodd" fill="#3E2A3C" opacity="0.06"/>

  <!-- colophon -->
  <text x="300" y="792" text-anchor="middle" font-size="12" letter-spacing="5" fill="#FFF6EA" opacity="0.8">KATHA · CONTEMPORARY ROMANCE</text>
</svg>
