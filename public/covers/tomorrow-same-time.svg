<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" font-family="Georgia, 'Times New Roman', serif">
  <!-- YOUNG ADULT · hand-drawn energy on notebook paper -->
  <rect width="600" height="800" fill="#FAFAF8"/>
  <!-- ruled lines + margin -->
  <g stroke="#B8CDD9" stroke-width="2">
    <line x1="0" y1="140" x2="600" y2="140"/><line x1="0" y1="200" x2="600" y2="200"/>
    <line x1="0" y1="260" x2="600" y2="260"/><line x1="0" y1="320" x2="600" y2="320"/>
    <line x1="0" y1="380" x2="600" y2="380"/><line x1="0" y1="440" x2="600" y2="440"/>
    <line x1="0" y1="500" x2="600" y2="500"/><line x1="0" y1="560" x2="600" y2="560"/>
    <line x1="0" y1="620" x2="600" y2="620"/><line x1="0" y1="680" x2="600" y2="680"/>
  </g>
  <line x1="80" y1="0" x2="80" y2="800" stroke="#E8A0A0" stroke-width="2.5"/>
  <!-- spiral holes -->
  <g fill="#E5E2DC" stroke="#C9C5BD" stroke-width="1.5">
    <circle cx="38" cy="120" r="9"/><circle cx="38" cy="230" r="9"/><circle cx="38" cy="340" r="9"/>
    <circle cx="38" cy="450" r="9"/><circle cx="38" cy="560" r="9"/><circle cx="38" cy="670" r="9"/>
  </g>
  <!-- doodles: rain, umbrella, a crossed-out heart, phone -->
  <g stroke="#2E7D5B" stroke-width="3" stroke-linecap="round" fill="none">
    <line x1="440" y1="150" x2="432" y2="185"/><line x1="480" y1="160" x2="472" y2="195"/><line x1="515" y1="145" x2="507" y2="180"/>
  </g>
  <path d="M450 260 A45 45 0 0 1 540 260 Z" fill="#B56A44" stroke="#33210F" stroke-width="3"/>
  <line x1="495" y1="260" x2="495" y2="300" stroke="#33210F" stroke-width="3"/>
  <g transform="translate(500,610)" stroke="#C45A3C" stroke-width="3" fill="none">
    <path d="M0 8 a8 8 0 0 1 16 0 q0 8 -8 14 q-8 -6 -8 -14 a8 8 0 0 1 16 0" transform="scale(1.4)"/>
    <line x1="-6" y1="30" x2="30" y2="-4"/>
  </g>
  <rect x="120" y="590" width="46" height="80" rx="8" fill="none" stroke="#33210F" stroke-width="3"/>
  <text x="143" y="640" text-anchor="middle" font-size="26" fill="#C45A3C" font-family="Inter, sans-serif">1</text>
  <!-- marker title, slightly tilted -->
  <g transform="rotate(-2 300 380)">
    <text x="110" y="330" font-size="58" font-weight="bold" fill="#33210F">Tomorrow,</text>
    <text x="110" y="430" font-size="58" font-weight="bold" fill="#2E7D5B">Same Time?</text>
    <path d="M110 452 q120 12 250 2" fill="none" stroke="#D4A646" stroke-width="5" stroke-linecap="round"/>
  </g>
  <text x="110" y="530" font-size="20" font-style="italic" fill="#5C3B28">Isa Navarro</text>
  <text x="110" y="748" font-size="13" letter-spacing="7" fill="#B56A44">KATHA · YOUNG ADULT</text>
</svg>
