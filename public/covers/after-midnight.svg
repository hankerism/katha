<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" font-family="Georgia, 'Times New Roman', serif">
  <!-- POETRY · jalousie light filing the room into strips; the logbook hours -->
  <rect width="600" height="800" fill="#141414"/>
  <!-- streetlight through jalousies: strips across the dark -->
  <g fill="#D4A646">
    <rect x="0" y="300" width="600" height="26" opacity="0.30" transform="skewY(-6)"/>
    <rect x="0" y="360" width="600" height="26" opacity="0.22" transform="skewY(-6)"/>
    <rect x="0" y="420" width="600" height="26" opacity="0.15" transform="skewY(-6)"/>
    <rect x="0" y="480" width="600" height="26" opacity="0.10" transform="skewY(-6)"/>
    <rect x="0" y="540" width="600" height="26" opacity="0.06" transform="skewY(-6)"/>
  </g>
  <!-- the one lit window, far side -->
  <rect x="470" y="96" width="66" height="88" fill="#D4A646" opacity="0.85"/>
  <line x1="470" y1="140" x2="536" y2="140" stroke="#141414" stroke-width="5"/>
  <line x1="503" y1="96" x2="503" y2="184" stroke="#141414" stroke-width="5"/>
  <!-- timestamps, the cycle's spine -->
  <g font-size="17" fill="#F8F5F1" opacity="0.45" font-style="italic">
    <text x="64" y="560">12:01</text>
    <text x="64" y="596">12:58</text>
    <text x="64" y="632">1:41</text>
    <text x="64" y="668">3:12</text>
  </g>
  <line x1="150" y1="554" x2="330" y2="554" stroke="#F8F5F1" stroke-width="1.5" opacity="0.2"/>
  <line x1="150" y1="590" x2="390" y2="590" stroke="#F8F5F1" stroke-width="1.5" opacity="0.2"/>
  <line x1="150" y1="626" x2="300" y2="626" stroke="#F8F5F1" stroke-width="1.5" opacity="0.2"/>
  <line x1="150" y1="662" x2="420" y2="662" stroke="#F8F5F1" stroke-width="1.5" opacity="0.2"/>
  <text x="64" y="110" font-size="14" letter-spacing="8" fill="#D4A646">KATHA · POETRY</text>
  <text x="64" y="200" font-size="62" font-weight="bold" fill="#F8F5F1">After</text>
  <text x="64" y="272" font-size="62" font-style="italic" fill="#D4A646">Midnight</text>
  <text x="64" y="322" font-size="20" font-style="italic" fill="#F8F5F1" opacity="0.85">J. Salvador</text>
  <text x="64" y="765" font-size="13" fill="#F8F5F1" opacity="0.5">whatever is said at 3:12 is said under oath</text>
</svg>
